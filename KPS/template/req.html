<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ heading }}</title>

    <!-- Social Meta Tags -->
    <meta name="description" content="Easily share and distribute files">
    <meta property="og:title" content="MRVIOLETSTREAMBOT - FileToLink">
    <meta property="og:description" content="File Streamer">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://i.ibb.co/3YdmmDj6/MRVIOLETSTREAMBOT-favicon.png">

    <!-- Configuration -->
    <meta name="theme-color" content="#1a1a2e">
    <meta name="msapplication-navbutton-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-status-bar-style" content="#1a1a2e">
    <meta name="color-scheme" content="dark light">
    <meta name="application-name" content="MRVIOLETSTREAMBOT - FileToLink">

    <!-- Icons -->
    <link rel="icon" href="https://i.ibb.co/3YdmmDj6/MRVIOLETSTREAMBOT-favicon.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/3YdmmDj6/MRVIOLETSTREAMBOT-favicon.png">

    <!-- External Resources -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">

    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fyaz05/Resources@main/FileToLink/style.css">
</head>
<body>
    <button class="theme-toggle button-base" aria-label="Toggle Light/Dark Mode" aria-pressed="false" title="Toggle Light/Dark Mode">
        <i class="fas fa-moon" aria-hidden="true"></i>
    </button>

    <div class="background-animation" aria-hidden="true">
        <div class="bg-gradient"></div>
    </div>

    <div class="container">
        <header class="header">
            <div class="file-info">
                <h1 id="file-name">{{ file_name }}</h1>
                <div class="file-meta" role="group" aria-label="File metadata"></div>
            </div>
        </header>

        <main id="main-content">
            <section class="player-container" aria-label="Video Player">
                <video id="player" playsinline preload="metadata" controlsList="nodownload" aria-label="Video player">
                    <source src="{{ src }}" type="video/mp4" />
                    <p>Your browser does not support the video tag. Please <a href="{{ src }}" download>download the video</a> instead.</p>
                </video>
            </section>

            <!-- Audio Track Selector -->
            <section id="track-selector-container" class="track-selector-container" aria-label="Audio Track Selection" style="display:none; margin: 1rem 0;">
                <div class="track-selector-bar" style="display:flex; align-items:center; gap:1rem; padding:0.75rem 1.25rem; background:rgba(255,255,255,0.05); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.1); border-radius:1rem;">
                    <div class="track-icon" style="width:36px; height:36px; background:linear-gradient(135deg,#6366f1,#a855f7); border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:0.9rem;">
                        <i class="fas fa-language" aria-hidden="true"></i>
                    </div>
                    <div>
                        <div class="track-label" style="font-size:0.8rem; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:0.1em; white-space:nowrap;">Audio Track</div>
                    </div>
                    <select id="audio-track-select" aria-label="Select audio track" style="flex:1; min-width:0; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:white; padding:0.5rem 2rem 0.5rem 0.75rem; border-radius:0.5rem; font-size:0.9rem; cursor:pointer; outline:none;">
                        <option value="-1">Loading tracks...</option>
                    </select>
                    <span id="track-badge" style="display:none; padding:0.2rem 0.6rem; background:rgba(99,102,241,0.15); color:#818cf8; border-radius:0.4rem; font-size:0.75rem; font-weight:600;">
                        <i class="fas fa-check-circle"></i>
                        <span id="track-badge-text">Default</span>
                    </span>
                </div>
                <div id="remux-notice" style="display:none; margin-top:0.5rem; padding:0.6rem 1rem; background:rgba(234,179,8,0.08); border:1px solid rgba(234,179,8,0.15); border-radius:0.75rem; font-size:0.8rem; color:rgba(234,179,8,0.8); align-items:center; gap:0.5rem;">
                    <i class="fas fa-info-circle"></i>
                    <span>Playing with selected audio track via remux. Seeking may be limited.</span>
                </div>
            </section>

            <nav class="controls-section" aria-label="File options">
                <div class="dropdown-container" id="stream-dropdown-container">
                    <button type="button" class="action-button button-base secondary-button stream-btn" aria-haspopup="true" aria-expanded="false" aria-controls="stream-menu" id="stream-btn-label">
                        <i class="fas fa-external-link-alt" aria-hidden="true"></i>
                        <span>Stream</span>
                    </button>
                    <div class="dropdown-menu" id="stream-menu" aria-labelledby="stream-btn-label" role="menu">
                        <div class="stream-menu-header">
                            <h3>Open with external player</h3>
                            <button type="button" aria-label="Close menu" class="stream-menu-close button-base">
                                <i class="fas fa-times" aria-hidden="true"></i>
                            </button>
                        </div>
                        <div class="stream-menu-content">
                            <div class="stream-category">
                                <h4 class="category-heading"><i class="fas fa-mobile-screen-button" aria-hidden="true"></i> Mobile Players</h4>
                                <div class="player-grid" role="group" aria-label="Mobile video players">
                                    <button type="button" class="player-card dropdown-item" role="menuitem" data-player-type="vlc">
                                        <img src="https://cdn.jsdelivr.net/gh/fyaz05/Resources@main/HydroStreamerBot/vlc.png" alt="VLC Mobile" loading="lazy" width="32" height="32" class="player-icon">
                                        <span class="player-name">VLC Mobile</span>
                                    </button>
                                    <button type="button" class="player-card dropdown-item" role="menuitem" data-player-type="mxpro">
                                        <img src="https://cdn.jsdelivr.net/gh/fyaz05/Resources@main/HydroStreamerBot/mx.png" alt="MX Player Pro" loading="lazy" width="32" height="32" class="player-icon">
                                        <span class="player-name">MX Pro</span>
                                    </button>
                                    <button type="button" class="player-card dropdown-item" role="menuitem" data-player-type="mx">
                                        <img src="https://cdn.jsdelivr.net/gh/fyaz05/Resources@main/HydroStreamerBot/mx.png" alt="MX Player" loading="lazy" width="32" height="32" class="player-icon">
                                        <span class="player-name">MX Player</span>
                                    </button>
                                    <button type="button" class="player-card dropdown-item" role="menuitem" data-player-type="nplayer">
                                        <img src="https://cdn.jsdelivr.net/gh/fyaz05/Resources@main/HydroStreamerBot/nPlayer.webp" alt="nPlayer" loading="lazy" width="32" height="32" class="player-icon">
                                        <span class="player-name">nPlayer</span>
                                    </button>
                                     <button type="button" class="player-card dropdown-item" role="menuitem" data-player-type="splayer">
                                        <img src="https://cdn.jsdelivr.net/gh/fyaz05/Resources@main/HydroStreamerBot/splayer.webp" alt="S Player" loading="lazy" width="32" height="32" class="player-icon">
                                        <span class="player-name">S Player</span>
                                    </button>
                                     <button type="button" class="player-card dropdown-item" role="menuitem" data-player-type="km">
                                        <img src="https://cdn.jsdelivr.net/gh/fyaz05/Resources@main/HydroStreamerBot/km.webp" alt="KM Player" loading="lazy" width="32" height="32" class="player-icon">
                                        <span class="player-name">KM Player</span>
                                    </button>
                                </div>
                            </div>
                            <div class="stream-category">
                                <h4 class="category-heading"><i class="fas fa-desktop" aria-hidden="true"></i> Desktop Players</h4>
                                <div class="player-grid" role="group" aria-label="Desktop video players">
                                    <button type="button" class="player-card dropdown-item" role="menuitem" data-player-type="vlc-pc" title="Open in VLC Player (PC)">
                                        <img src="https://cdn.jsdelivr.net/gh/fyaz05/Resources@main/HydroStreamerBot/vlc.png" alt="VLC Player" loading="lazy" width="32" height="32" class="player-icon">
                                        <span class="player-name">VLC Player</span>
                                    </button>
                                    <button type="button" class="player-card dropdown-item" role="menuitem" data-player-type="potplayer" title="Open in PotPlayer">
                                        <img src="https://cdn.jsdelivr.net/gh/fyaz05/Resources@main/FileToLink/pot.png" alt="PotPlayer" loading="lazy" width="32" height="32" class="player-icon">
                                        <span class="player-name">PotPlayer</span>
                                    </button>
                                    <button type="button" class="player-card dropdown-item" role="menuitem" data-player-type="mpc" title="Open in MPC-HC">
                                        <img src="https://cdn.jsdelivr.net/gh/fyaz05/Resources@main/FileToLink/classic.png" alt="MPC-HC" loading="lazy" width="32" height="32" class="player-icon">
                                        <span class="player-name">MPC-HC</span>
                                    </button>
                                    <button type="button" class="player-card dropdown-item" role="menuitem" data-player-type="kmpc" title="Open in KM Player (PC)">
                                        <img src="https://cdn.jsdelivr.net/gh/fyaz05/Resources@main/HydroStreamerBot/km.webp" alt="KM Player" loading="lazy" width="32" height="32" class="player-icon">
                                        <span class="player-name">KM Player</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <button type="button" class="action-button button-base secondary-button" title="Download the video" aria-label="Download video file">
                    <i class="fas fa-cloud-download-alt" aria-hidden="true"></i>
                    <span>Download</span>
                </button>
                <button type="button" class="action-button button-base secondary-button" title="Copy video link" aria-label="Copy video link to clipboard">
                    <i class="fas fa-copy" aria-hidden="true"></i>
                    <span>Copy Link</span>
                </button>
            </nav>
        </main>
    </div>

    <footer>
        <p><span id="kps-text">⚡ MRVIOLETSTREAMBOT</span> © <span id="current-year"></span> | <a href="https://telegram.me/MRVIOLETSTREAMBOT" target="_blank" rel="noopener noreferrer" aria-label="Support Channel"><i class="fa-brands fa-telegram" aria-hidden="true"></i> <span>Telegram</span></a></p>
    </footer>

    <div class="toast" id="toast" role="alert" aria-live="polite" aria-atomic="true" aria-hidden="true">
        <div class="toast-icon" aria-hidden="true">
            <i class="fas fa-info-circle"></i>
        </div>
        <div class="toast-message">Action completed.</div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js" defer></script>
    <script src="https://cdn.jsdelivr.net/gh/fyaz05/Resources@main/FileToLink/script.js" defer></script>
    <script>
    // ─── Multi Audio Track Feature ───────────────────────────────────────────
    (function() {
        const ORIGINAL_SRC = '{{ src }}';
        const TRACKS_API_URL = '{{ src }}'.replace(/^(https?:\/\/[^\/]+)\//, '$1/api/tracks/');
        const REMUX_BASE_URL = '{{ src }}'.replace(/^(https?:\/\/[^\/]+)\//, '$1/remux/');
        let currentAudioTrack = -1;
        let tracksData = null;

        async function loadTracks() {
            try {
                const resp = await fetch(TRACKS_API_URL);
                if (!resp.ok) return;

                tracksData = await resp.json();
                const audioTracks = tracksData.audio_tracks || [];

                if (audioTracks.length <= 1) return;
                if (!tracksData.has_multiple_audio) return;

                // Show the track selector
                const container = document.getElementById('track-selector-container');
                if (!container) return;
                container.style.display = 'block';

                const select = document.getElementById('audio-track-select');
                select.innerHTML = '';

                // Add default option
                const defaultOpt = document.createElement('option');
                defaultOpt.value = '-1';
                defaultOpt.textContent = '\u25B6 Original Stream (Direct, Full Speed)';
                select.appendChild(defaultOpt);

                // Add each audio track
                audioTracks.forEach(function(track, idx) {
                    const opt = document.createElement('option');
                    opt.value = track.audio_index;
                    opt.textContent = track.label || ('Track ' + (idx + 1));
                    select.appendChild(opt);
                });

                // Show badge
                const badge = document.getElementById('track-badge');
                if (badge) {
                    badge.style.display = 'inline-flex';
                    const badgeText = document.getElementById('track-badge-text');
                    if (badgeText) badgeText.textContent = audioTracks.length + ' available';
                }

                // Listen for changes
                select.addEventListener('change', function() {
                    switchAudioTrack(parseInt(this.value));
                });
            } catch (err) {
                console.error('Track loading error:', err);
            }
        }

        function switchAudioTrack(audioIndex) {
            if (audioIndex === currentAudioTrack) return;

            const video = document.querySelector('#player');
            const source = video ? video.querySelector('source') : null;
            const notice = document.getElementById('remux-notice');
            if (!video || !source) return;

            const currentTime = video.currentTime || 0;
            const wasPlaying = !video.paused;

            if (audioIndex === -1) {
                source.src = ORIGINAL_SRC;
                source.type = 'video/mp4';
                if (notice) notice.style.display = 'none';
            } else {
                source.src = REMUX_BASE_URL + '?audio=' + audioIndex;
                source.type = 'video/mp4';
                if (notice) notice.style.display = 'flex';
            }

            currentAudioTrack = audioIndex;
            video.load();

            if (audioIndex === -1 && currentTime > 0) {
                video.addEventListener('loadedmetadata', function onLoad() {
                    video.currentTime = currentTime;
                    if (wasPlaying) video.play();
                    video.removeEventListener('loadedmetadata', onLoad);
                });
            } else {
                video.addEventListener('canplay', function onCanPlay() {
                    if (wasPlaying) video.play();
                    video.removeEventListener('canplay', onCanPlay);
                });
            }
        }

        // Load tracks when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadTracks);
        } else {
            loadTracks();
        }
    })();
    </script>
</body>
</html>
